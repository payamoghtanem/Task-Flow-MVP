name: Gate 5 — Sprint End

on:
  workflow_dispatch:
    inputs:
      sprint_number:
        description: 'Sprint number completing'
        required: true
        type: number

jobs:
  memory-compaction:
    name: Memory Compaction (Agent 21)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compact agent memories
        run: |
          echo "Lesson Learner (21) compacting all agents/*/memory/ to ≤200 lines"
          echo "Reference: Workflow 5, Step 5"

  standards-review:
    name: Standards Version Review
    runs-on: ubuntu-latest
    needs: memory-compaction
    steps:
      - name: Lesson Learner + Scrum Master standards review
        run: |
          echo "Reviewing standards for update proposals from sprint ${{ inputs.sprint_number }}"
          echo "Reference: Workflow 5, Steps 3-4"

  status-report:
    name: Product Status Report (Agent 01)
    runs-on: ubuntu-latest
    needs: standards-review
    steps:
      - name: Generate sprint status report
        run: |
          echo "Orchestrator (01) generating artifacts/product-status-report.md"
          echo "Reference: Workflow 5, Step 6"

  audit-sign:
    name: Audit Trail Archive
    runs-on: ubuntu-latest
    needs: status-report
    steps:
      - name: Archive sprint audit trail
        run: |
          echo "Archiving artifacts/audit-trail.md for Sprint ${{ inputs.sprint_number }}"
          echo "Signed and immutable — no modifications permitted"

      - name: Gate 5 completion check
        run: |
          echo "GATE 5 COMPLETE: Sprint ${{ inputs.sprint_number }} closed"
          echo "All agent memories compacted"
          echo "Standards reviewed"
          echo "Status report generated"
          echo "Audit trail archived"
