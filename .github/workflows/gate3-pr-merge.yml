name: Gate 3 — Post-Merge Quality

on:
  push:
    branches: [main, develop]

jobs:
  backend-test-coverage:
    name: Backend Test Suite & Coverage (Agent 13)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests with coverage threshold
        working-directory: backend
        env:
          NODE_ENV: test
        run: npm run test:coverage

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-post-merge
          path: backend/coverage/

      - name: Gate 3 backend coverage check
        if: failure()
        run: |
          echo "GATE 3 BLOCKED: Backend coverage below threshold (80%)"
          echo "Reference: standards/testing-standard/coverage-thresholds.md v1.0"
          exit 1

  frontend-test-coverage:
    name: Frontend Test Suite & Coverage (Agent 13)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage threshold
        working-directory: frontend
        env:
          NODE_ENV: test
        run: npm run test:coverage

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-post-merge
          path: frontend/coverage/

      - name: Gate 3 frontend coverage check
        if: failure()
        run: |
          echo "GATE 3 BLOCKED: Frontend coverage below threshold (80%)"
          echo "Reference: standards/testing-standard/coverage-thresholds.md v1.0"
          exit 1

  traceability-check:
    name: Requirements Traceability (Agent 15)
    runs-on: ubuntu-latest
    needs: [backend-test-coverage, frontend-test-coverage]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run traceability audit
        run: |
          echo "Running traceability check per Workflow 3"
          # Traceability Agent (15) produces compliance-report

      - name: Check for RED gaps
        run: |
          if grep -q "| RED" artifacts/compliance-traceability-matrix.md 2>/dev/null; then
            echo "GATE 3 FLAG: RED traceability gaps detected"
            echo "Reference: workflows/03-requirements-traceability-compliance-audit.md"
            exit 1
          fi
          echo "GATE 3 PASS: Traceability matrix has no RED gaps"

  security-audit:
    name: npm Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend npm audit
        working-directory: backend
        run: |
          npm ci
          npm audit --audit-level=critical

      - name: Frontend npm audit (production deps only)
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=critical --omit=dev || echo "WARN: Frontend devDependency CVEs present (tracked SEC-P2-001 — not in production bundle)"
