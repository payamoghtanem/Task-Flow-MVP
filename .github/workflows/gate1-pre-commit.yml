name: Gate 1 — Pre-Commit Security

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (secrets scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Fail on secret detection
        if: failure()
        run: |
          echo "GATE 1 BLOCKED: Secret detected in commit."
          echo "Reference: standards/coding-standard/security-standards.md Rule SEC-001"
          exit 1

  sast-scan:
    name: SAST Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/security-audit
            p/secrets
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Check Semgrep results
        if: failure()
        run: |
          echo "GATE 1 BLOCKED: P1 SAST finding detected."
          echo "Reference: frameworks/owasp/CLAUDE.md"
          exit 1

  dependency-scan:
    name: Dependency CVE Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy dependency scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'table'

      - name: Fail on critical CVE
        if: failure()
        run: |
          echo "GATE 1 BLOCKED: Critical CVE detected in dependencies."
          echo "Reference: standards/coding-standard/security-standards.md Rule SEC-009"
          exit 1
