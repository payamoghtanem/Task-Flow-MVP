# Cost Tier Reference
cost_tiers:
  tier_1_fast:
    model: claude-haiku-4-5
    cost_per_1k_input: 0.00025
    cost_per_1k_output: 0.00125
    use_for: "Routing, git ops, deterministic tasks"
  tier_2_balanced:
    model: claude-sonnet-4-6
    cost_per_1k_input: 0.003
    cost_per_1k_output: 0.015
    use_for: "Process orchestration, QA, compliance"
  tier_3_powerful:
    model: claude-opus-4-8
    cost_per_1k_input: 0.015
    cost_per_1k_output: 0.075
    use_for: "Architecture, deep code, security analysis"

# Circuit Breaker
circuit_breaker:
  latency_p99_threshold_ms: 30000
  error_rate_threshold_pct: 5
  fallback_trigger: "Automatic switch to fallback model on threshold breach"
  recovery_window_minutes: 15
